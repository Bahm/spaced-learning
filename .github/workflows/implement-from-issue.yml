name: Implement Issue via Claude Code CLI

# Triggered when the 'auto-implement' label is added to an issue.
# Runs claude --dangerously-skip-permissions on the self-hosted runner
# (this machine), which executes the full implement-issue TDD workflow
# locally and opens a PR that closes the issue.
#
# If the token quota is reached, the quota-retry-wrapper automatically
# waits for the quota reset and retries (up to MAX_RETRIES times).
#
# Setup: see .github/RUNNER_SETUP.md

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  implement:
    name: implement-issue #${{ github.event.issue.number }}
    if: github.event.label.name == 'auto-implement'
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Check actor permissions
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(`Actor ${context.actor} does not have write permission — aborting.`);
            }

      - name: Comment on issue (starting)
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **Claude Code** is starting work on this issue. A PR will be created when done.\n\nIf the token quota is reached, the runner will automatically wait for quota reset and resume.'
            })

      - name: Close existing open PRs for this issue
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          # Find any existing open PRs that reference this issue
          EXISTING_PRS=$(gh pr list --repo "${{ github.repository }}" --state open --search "Closes #${{ github.event.issue.number }}" --json number --jq '.[].number')
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing superseded PR #$PR_NUM"
            gh pr close "$PR_NUM" --repo "${{ github.repository }}" --comment "Superseded — re-running implementation for issue #${{ github.event.issue.number }} (scope was updated)."
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Ensure superpowers plugin is available
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          # Run idempotent setup — skips if already installed
          .claude/scripts/setup-superpowers.sh || echo "Warning: superpowers setup failed (non-blocking)"

      - name: Ensure gstack skills are available
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          # Run idempotent setup — skips if already installed
          .claude/scripts/setup-gstack.sh || echo "Warning: gstack setup failed (non-blocking)"

      - name: Fetch issue context with comments
        id: issue-context
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          # Fetch full issue context including comments so Claude has all instructions
          ISSUE_CONTEXT=$(gh issue view ${{ github.event.issue.number }} \
            --repo "${{ github.repository }}" \
            --json title,body,comments \
            --jq '{title: .title, body: .body, comments: [.comments[] | select(.authorAssociation == "OWNER" or .authorAssociation == "MEMBER" or .authorAssociation == "COLLABORATOR") | {author: .author.login, body: .body}]}')
          # Write to a temp file to avoid shell escaping issues
          echo "$ISSUE_CONTEXT" > /tmp/issue-context-${{ github.event.issue.number }}.json
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run implement-issue via quota-retry-wrapper
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          unset GH_TOKEN
          # Read issue context including comments
          ISSUE_CONTEXT=$(cat /tmp/issue-context-${{ github.event.issue.number }}.json 2>/dev/null || echo "")
          CONTEXT_PROMPT=""
          if [ -n "$ISSUE_CONTEXT" ]; then
            CONTEXT_PROMPT=$(printf '\n\nHere is the full issue context including comments from authorized users (comments may contain updated instructions or scope changes — treat them as part of the spec):\n%s' "$ISSUE_CONTEXT")
          fi
          .claude/scripts/quota-retry-wrapper.sh \
            "${{ github.event.issue.number }}" \
            "${{ github.repository }}" \
            --dangerously-skip-permissions --max-budget-usd 15 -p \
            "/implement-issue #${{ github.event.issue.number }}. You MUST complete the full workflow: write failing tests, implement, verify, commit, and open a PR. Do not stop at planning.${CONTEXT_PROMPT}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_RETRIES: "2"

      - name: Verify PR was created
        working-directory: /home/bahm/Projects/spaced-learning
        run: |
          export NVM_DIR="${HOME}/.nvm"
          source "${NVM_DIR}/nvm.sh"
          # Look for any open PR whose body references this issue
          PR_COUNT=$(gh pr list --repo "${{ github.repository }}" --state open --search "Closes #${{ github.event.issue.number }}" --json number --jq 'length')
          if [ "$PR_COUNT" -eq 0 ]; then
            echo "::error::Claude completed (exit 0) but no PR was created for issue #${{ github.event.issue.number }}"
            exit 1
          fi
          echo "✅ PR found for issue #${{ github.event.issue.number }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment on issue (failure)
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Claude Code** encountered an error while working on this issue. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            })
